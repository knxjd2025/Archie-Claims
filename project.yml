# XcodeGen fallback spec. The checked-in ArchieClaims.xcodeproj should open
# directly in Xcode 16+. If it ever gets corrupted or you prefer regenerating:
#   brew install xcodegen && xcodegen generate
name: ArchieClaims
options:
  bundleIdPrefix: com.archieclaims
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  ArchieClaims:
    type: application
    platform: iOS
    sources:
      - path: ArchieClaims
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archieclaims.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ArchieClaims/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
  ArchieClaimsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ArchieClaimsTests
    dependencies:
      - target: ArchieClaims
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archieclaims.app.tests
        GENERATE_INFOPLIST_FILE: YES
